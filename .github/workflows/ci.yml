# CI/CD Pipeline for Van Nueman
# Runs on push to main and v0.* branches

name: Van Nueman CI

on:
  push:
    branches: [ main, v0.* ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for versioning
    
    - name: Setup Visual Studio
      uses: microsoft/setup-msbuild@v1
    
    - name: Setup vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $GITHUB_ENV
      shell: bash
    
    - name: Install dependencies
      run: |
        .\vcpkg\vcpkg install vulkan glfw3
    
    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
    
    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }}
    
    - name: Run Tests
      run: |
        cd build
        ctest -C ${{ env.BUILD_TYPE }} --output-on-failure
      continue-on-error: true
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: van-nueman-build-windows
        path: build/${{ env.BUILD_TYPE }}/

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libvulkan-dev libglfw3-dev libpq-dev
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
    
    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }}
    
    - name: Run Tests
      run: |
        cd build
        ctest -C ${{ env.BUILD_TYPE }} --output-on-failure
      continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run clang-format
      run: |
        sudo apt-get install -y clang-format
        find . -name "*.cpp" -o -name "*.h" | xargs clang-format --dry-run --Werror
      continue-on-error: true

  council-approval:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pytest httpx
    
    - name: Run Pillar Council unit tests
      run: |
        if [ -f "../Van_Nueman_AI/Van_Nueman_Social_Sim/pillar_council/test_council.py" ]; then
          cd ../Van_Nueman_AI/Van_Nueman_Social_Sim
          python -m pytest pillar_council/test_council.py -v --tb=short
        else
          echo "Council tests not found — skip"
        fi
      continue-on-error: true

  adversarial-review:
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pytest

    - name: Run adversarial review on changed files
      run: |
        CHANGED_FILES=$(git diff --name-only HEAD~1 2>/dev/null || echo "")
        if [ -z "$CHANGED_FILES" ]; then
          echo "No changed files to review"
          exit 0
        fi
        if [ -f "../Van_Nueman_Agents/scripts/adversarial_review.py" ]; then
          cd ../Van_Nueman_Agents
          python -m scripts.adversarial_review --files $CHANGED_FILES || true
        else
          echo "Adversarial review script not found — skip"
        fi
      continue-on-error: true
